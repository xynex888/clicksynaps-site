<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ClickSynaps</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    height: 100%;
    background: #000;
    color: #fff;
    font-family: 'DM Sans', sans-serif;
    -webkit-font-smoothing: antialiased;
  }

  body {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    padding: 2rem;
  }

  .logo {
    width: 312px;
    max-width: 80vw;
    margin-bottom: 2rem;
  }

  .tagline {
    font-size: 1.05rem;
    font-weight: 300;
    letter-spacing: 0.04em;
    color: rgba(255,255,255,0.55);
    text-align: center;
    max-width: 420px;
    line-height: 1.6;
    margin-bottom: 3.5rem;
  }

  .register-link {
    font-size: 0.78rem;
    font-weight: 400;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: rgba(255,255,255,0.3);
    text-decoration: none;
    border-bottom: 1px solid rgba(255,255,255,0.12);
    padding-bottom: 2px;
    cursor: pointer;
    transition: color 0.25s, border-color 0.25s;
  }

  .register-link:hover {
    color: rgba(255,255,255,0.65);
    border-color: rgba(255,255,255,0.35);
  }

  /* Modal */
  .overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.82);
    align-items: center;
    justify-content: center;
    z-index: 100;
    padding: 2rem;
  }

  .overlay.open { display: flex; }

  .modal {
    background: #0d0d0d;
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 6px;
    padding: 2.5rem 2.5rem 2rem;
    width: 100%;
    max-width: 400px;
  }

  .modal h2 {
    font-size: 0.7rem;
    font-weight: 400;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: rgba(255,255,255,0.3);
    margin-bottom: 1.8rem;
  }

  .field {
    margin-bottom: 1.2rem;
  }

  .field label {
    display: block;
    font-size: 0.72rem;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: rgba(255,255,255,0.3);
    margin-bottom: 0.45rem;
  }

  .field input,
  .field textarea {
    width: 100%;
    background: transparent;
    border: none;
    border-bottom: 1px solid rgba(255,255,255,0.12);
    color: #fff;
    font-family: 'DM Sans', sans-serif;
    font-size: 0.92rem;
    font-weight: 300;
    padding: 0.4rem 0;
    outline: none;
    transition: border-color 0.2s;
    resize: none;
  }

  .field input:focus,
  .field textarea:focus {
    border-color: #1F815B;
  }

  .field textarea {
    min-height: 70px;
  }

  .modal-footer {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-top: 2rem;
  }

  .btn-close {
    font-size: 0.72rem;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: rgba(255,255,255,0.2);
    background: none;
    border: none;
    cursor: pointer;
    font-family: 'DM Sans', sans-serif;
    padding: 0;
    transition: color 0.2s;
  }

  .btn-close:hover { color: rgba(255,255,255,0.5); }

  .btn-submit {
    font-size: 0.72rem;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: #fff;
    background: #1F815B;
    border: none;
    border-radius: 3px;
    padding: 0.55rem 1.4rem;
    cursor: pointer;
    font-family: 'DM Sans', sans-serif;
    font-weight: 400;
    transition: background 0.2s;
  }

  .btn-submit:hover { background: #247a57; }

  .success-msg {
    display: none;
    text-align: center;
    padding: 1.5rem 0 0.5rem;
    font-size: 0.85rem;
    font-weight: 300;
    color: rgba(255,255,255,0.45);
    line-height: 1.7;
  }

  .success-msg span {
    display: block;
    font-size: 0.68rem;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: #1F815B;
    margin-bottom: 0.6rem;
  }
</style>
</head>

<p class="tagline">FIX THE FLOW.</p>

<a class="register-link" onclick="document.querySelector('.overlay').classList.add('open')">Register interest</a>

<div class="overlay" onclick="if(event.target===this)this.classList.remove('open')">
  <div class="modal">
    <h2>Register interest</h2>

    <div id="form-body">
      <div class="field">
        <label>Name</label>
        <input type="text" id="f-name" placeholder="Your name" autocomplete="name">
      </div>
      <div class="field">
        <label>Email</label>
        <input type="email" id="f-email" placeholder="you@example.com" autocomplete="email">
      </div>
      <div class="field">
        <label>Comment <span style="opacity:0.4;font-size:0.65rem;text-transform:none;letter-spacing:0">(optional)</span></label>
        <textarea id="f-comment" placeholder="Tell us about your use case…"></textarea>
      </div>
      <div class="modal-footer">
        <button class="btn-close" onclick="document.querySelector('.overlay').classList.remove('open')">Cancel</button>
        <button class="btn-submit" onclick="submitForm()">Send</button>
      </div>
    </div>

    <div class="success-msg" id="success-msg">
      <span>Received</span>
      We'll be in touch shortly.
    </div>
  </div>
</div>

<script>
function submitForm() {
  const name = document.getElementById('f-name').value.trim();
  const email = document.getElementById('f-email').value.trim();
  const comment = document.getElementById('f-comment').value.trim();

  if (!name || !email) {
    const missing = !name ? document.getElementById('f-name') : document.getElementById('f-email');
    missing.style.borderColor = '#55408C';
    missing.focus();
    return;
  }

  const body = encodeURIComponent(
    'Name: ' + name + '\nEmail: ' + email + (comment ? '\n\nComment:\n' + comment : '')
  );
  window.location.href = 'mailto:info@clicksynaps.ai?subject=Register%20Interest%20%E2%80%94%20ClickSynaps&body=' + body;

  document.getElementById('form-body').style.display = 'none';
  document.getElementById('success-msg').style.display = 'block';
}
</script>

</body>
</html>
